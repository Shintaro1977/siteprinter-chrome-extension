<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SitePrinter for Chrome</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <h1 class="logo">SitePrinter</h1>
        <span class="badge">for Chrome</span>
      </div>
      <!-- アカウント情報 -->
      <div id="accountArea" class="account-area hidden">
        <span id="accountEmail" class="account-email"></span>
        <span id="planBadge" class="plan-badge plan-free">無料</span>
        <button id="logoutBtn" class="logout-btn">ログアウト</button>
      </div>
    </header>

    <!-- ログインビュー -->
    <div id="loginView" class="login-view hidden">
      <p class="login-desc">ログインするとプレビューできます</p>
      <form id="loginForm" class="login-form">
        <input type="email" id="emailInput" class="login-input" placeholder="メールアドレス" required>
        <input type="password" id="passwordInput" class="login-input" placeholder="パスワード" required>
        <p id="loginError" class="login-error hidden"></p>
        <button type="submit" class="login-btn">ログイン</button>
      </form>
      <div class="login-links">
        <button id="showSignupBtn" class="link-btn">アカウント作成</button>
      </div>
    </div>

    <!-- サインアップビュー -->
    <div id="signupView" class="login-view hidden">
      <p class="login-desc">新規アカウントを作成</p>
      <form id="signupForm" class="login-form">
        <input type="email" id="signupEmailInput" class="login-input" placeholder="メールアドレス" required>
        <input type="password" id="signupPasswordInput" class="login-input" placeholder="パスワード（6文字以上）" required>
        <p id="signupError" class="login-error hidden"></p>
        <button type="submit" class="login-btn">アカウントを作成</button>
      </form>
      <div class="login-links">
        <button id="showLoginBtn" class="link-btn">ログインに戻る</button>
      </div>
    </div>

    <!-- メインビュー -->
    <main id="mainView" class="main hidden">
      <section class="capture-section">
        <h2 class="section-title">キャプチャ対象</h2>

        <div class="tab-selector">
          <label class="radio-card active">
            <input type="radio" name="captureMode" value="current" checked>
            <span class="radio-content">
              <span class="radio-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
              </span>
              <span class="radio-label">現在のタブ</span>
            </span>
          </label>

          <label class="radio-card">
            <input type="radio" name="captureMode" value="multiple">
            <span class="radio-content">
              <span class="radio-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="9" y1="3" x2="9" y2="21"></line>
                  <rect x="7" y="7" width="14" height="14" rx="2" ry="2" fill="white"></rect>
                  <line x1="13" y1="7" x2="13" y2="21"></line>
                </svg>
              </span>
              <span class="radio-label">複数タブを選択</span>
            </span>
          </label>
        </div>

        <div id="tabList" class="tab-list hidden">
          <div class="tab-list-loading">
            <span class="spinner"></span>
            タブを読み込み中...
          </div>
        </div>
      </section>

      <button id="captureBtn" class="capture-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
        <span>スクリーンショットを取得</span>
      </button>
    </main>

    <footer class="footer">
      <a href="https://siteprinter.jp" target="_blank" class="footer-link">siteprinter.jp</a>
    </footer>
  </div>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-content">
      <span class="spinner large"></span>
      <p id="loadingText">スクリーンショットを取得中...</p>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>

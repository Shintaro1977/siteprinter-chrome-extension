<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capturing Screenshot...</title>
  <link rel="stylesheet" href="progress.css">
</head>
<body>
  <div id="main">
    <div id="pageTitle"></div>
    <div id="capturing">
      <div id="progressAndButton">
        <div id="progressContainer">
          <div id="progressValue"></div>
        </div>
        <span id="progressPercent">0%</span>
      </div>
    </div>
    <div class="warning-message">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      <span>処理中はタブを切り替えないでください</span>
    </div>
    <div id="buttonContainer">
      <button id="cancelBtn" class="cancel-btn">キャンセル</button>
    </div>
    <div id="processingLabel" class="hidden">
      <span>Processing...</span>
    </div>
  </div>
  <script type="module" src="progress.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SitePrinter - プレビュー</title>
  <link rel="stylesheet" href="preview.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <img src="../assets/logo.svg" alt="SitePrinter" class="logo-img">
        <span class="badge">extension</span>
      </div>
      <div class="header-right">
        <button id="downloadBtn" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          PDFをダウンロード
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <!-- Preview Panel -->
      <div class="preview-panel">
        <div class="preview-header">
          <span class="preview-title">プレビュー</span>
          <span id="pageInfo" class="page-info">1 / 1 ページ</span>
        </div>
        <div id="previewContainer" class="preview-container">
          <div class="preview-loading">
            <span class="spinner large"></span>
            <p>プレビューを生成中...</p>
          </div>
        </div>
      </div>

      <!-- Settings Panel -->
      <div class="settings-panel">
        <div class="settings-header">
          <h2 class="settings-title">設定</h2>
        </div>
        <div class="settings-content">
          <!-- Layout Settings -->
          <section class="settings-section">
            <h3 class="section-title">レイアウト</h3>

            <div class="setting-item">
              <label class="setting-label">用紙サイズ</label>
              <div class="paper-size-selector">
                <button class="paper-size-btn active" data-paper-size="a4">A4</button>
                <button class="paper-size-btn" data-paper-size="a3">A3</button>
              </div>
            </div>

            <div class="setting-item">
              <label class="setting-label">列数</label>
              <div class="column-selector">
                <button class="column-btn active" data-columns="1">1列</button>
                <button class="column-btn" data-columns="2">2列</button>
                <button class="column-btn" data-columns="3">3列</button>
                <button class="column-btn" data-columns="4">4列</button>
              </div>
            </div>

            <div class="setting-item">
              <label class="setting-label">重複エリア</label>
              <div class="overlap-selector">
                <button class="overlap-btn" data-overlap="small">小</button>
                <button class="overlap-btn active" data-overlap="medium">中</button>
                <button class="overlap-btn" data-overlap="large">大</button>
              </div>
              <p class="setting-description">セクション間の重なり量（2% / 5% / 8%）</p>
            </div>

            <div class="setting-item">
              <label class="checkbox-label">
                <input type="checkbox" id="showBorder" checked>
                <span>境界線を表示</span>
              </label>
            </div>
          </section>

          <!-- Header/Footer Settings -->
          <section class="settings-section">
            <h3 class="section-title">ヘッダー・フッター</h3>

            <div class="setting-item">
              <label class="checkbox-label">
                <input type="checkbox" id="showHeader">
                <span>ヘッダーを表示</span>
              </label>
              <p class="setting-description">ページタイトルとURLを表示</p>
            </div>

            <div class="setting-item">
              <label class="checkbox-label">
                <input type="checkbox" id="showFooter">
                <span>フッターを表示</span>
              </label>
              <p class="setting-description">日時・ページ番号・ロゴを表示</p>
            </div>
          </section>

          <!-- Screenshot List -->
          <section class="settings-section">
            <h3 class="section-title">スクリーンショット</h3>
            <div id="screenshotList" class="screenshot-list">
              <!-- Populated by JS -->
            </div>
          </section>

          <!-- Capture Info -->
          <section class="settings-section">
            <h3 class="section-title">取得情報</h3>
            <div class="capture-info-grid">
              <div class="capture-info-row">
                <span class="capture-info-label">画像形式</span>
                <span id="captureFormatInfo" class="capture-info-value">—</span>
              </div>
              <div class="capture-info-row">
                <span class="capture-info-label">予想PDFサイズ</span>
                <span id="estimatedSizeInfo" class="capture-info-value">—</span>
              </div>
            </div>
          </section>

          <!-- Notice -->
          <div class="settings-notice">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            <span>プレビューと実際のPDFは完全に同一ではない場合があります</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Upgrade Modal -->
  <div id="upgradeModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <div style="font-size: 48px; color: #f59e0b; margin-bottom: 16px;">✦</div>
        <h3>Pro機能が必要です</h3>
        <p>カスタム設定を使用したPDF生成はProプランでご利用いただけます。</p>
      </div>
      <div class="modal-body">
        <div class="feature-list">
          <div class="feature-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>自由な列数設定（2〜4列）</span>
          </div>
          <div class="feature-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>ヘッダー・フッターのカスタマイズ</span>
          </div>
          <div class="feature-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>A3用紙サイズ対応</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="upgradeModalBtn" class="btn btn-primary">
          <span style="font-size: 16px; margin-right: 4px;">✦</span>
          <span>Proプランにアップグレード</span>
        </button>
        <button id="cancelModalBtn" class="btn btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-content">
      <span class="spinner large"></span>
      <p id="loadingText">PDFを生成中...</p>
      <p id="loadingPercent" class="loading-percent"></p>
    </div>
  </div>

  <script type="module" src="preview.js"></script>
</body>
</html>
